<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Trax Eco System</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- ════ CACHE BUSTER — chạy TRƯỚC React ════ -->
    <script>
      (function() {
        var DEPLOY_VERSION = 'v_20260626030610_noconsole'; // Cache buster updated
        var cacheKey = 'traxeco_deploy_v';
        var lastDeploy = '';
        try { lastDeploy = localStorage.getItem(cacheKey) || ''; } catch(e) {}

        if (lastDeploy !== DEPLOY_VERSION) {
          var saved = false;
          try { 
            localStorage.setItem(cacheKey, DEPLOY_VERSION); 
            saved = true;
          } catch(e) {}
          if (!saved) return; // Prevent infinite reload loop on strict browsers like Safari

          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
            });
          }

          if ('caches' in window) {
            caches.keys().then(function(names) {
              names.forEach(function(name) { caches.delete(name); });
            });
          }

          setTimeout(function() { location.reload(); }, 600);
          return;
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
